<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
<div class="container">
  <div class="row">
    <div class="col-sm-6 col-sm-offset-3">
      <h2>Forgot Password</h2>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="POST">
        <div class="form-group">
          <label for="username">Enter your Signum (username):</label>
          <input type="text" class="form-control" name="username" required placeholder="e.g. AB1234">
        </div>
        <div class="form-group">
          <label for="email">Enter your registered Email:</label>
          <input type="email" class="form-control" name="email" required placeholder="you@example.com">
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
